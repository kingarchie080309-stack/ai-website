<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Dashboards</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0f2e 0%, #1a1a4d 100%);
            color: #e0e6ff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
        }

        h1 {
            font-size: 42px;
            font-weight: 700;
            margin-bottom: 10px;
            color: #fff;
        }

        .subtitle {
            font-size: 16px;
            color: #888;
        }

        .dashboards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .dashboard-link {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 30px;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s;
            text-align: center;
        }

        .dashboard-link:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-5px);
        }

        .dashboard-link.polymarket {
            border-color: rgba(245, 158, 11, 0.3);
        }

        .dashboard-link.polymarket:hover {
            background: rgba(245, 158, 11, 0.05);
            border-color: rgba(245, 158, 11, 0.5);
        }

        .dashboard-link.bitcoin {
            border-color: rgba(16, 185, 129, 0.3);
        }

        .dashboard-link.bitcoin:hover {
            background: rgba(16, 185, 129, 0.05);
            border-color: rgba(16, 185, 129, 0.5);
        }

        .icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .name {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .desc {
            font-size: 13px;
            color: #888;
            line-height: 1.5;
        }

        @media (max-width: 600px) {
            .dashboards {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 32px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 Trading Dashboards</h1>
            <p class="subtitle">Real-time market monitoring & arbitrage detection</p>
        </div>

        <div class="dashboards">
            <a href="/polymarket-dashboard.html" class="dashboard-link polymarket">
                <div class="icon">📊</div>
                <div class="name">Polymarket</div>
                <div class="desc">Bitcoin markets & arbitrage opportunities</div>
            </a>

            <a href="/index.html" class="dashboard-link bitcoin">
                <div class="icon">🚀</div>
                <div class="name">Arbitrage Scanner</div>
                <div class="desc">Bitcoin arb detection across exchanges</div>
            </a>
        </div>
    </div>
</body>
</html>
