<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polymarket Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0f2e 0%, #1a1a4d 100%);
            color: #e0e6ff;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            font-size: 32px;
            font-weight: 700;
            color: #fff;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #10b981;
            animation: pulse 2s infinite;
        }

        .dot.loading {
            background: #f59e0b;
            animation: pulse-slow 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        @keyframes pulse-slow {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            backdrop-filter: blur(10px);
        }

        .card h2 {
            font-size: 16px;
            color: #888;
            text-transform: uppercase;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .stat {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stat:last-child {
            border-bottom: none;
        }

        .stat-label {
            color: #888;
            font-size: 14px;
        }

        .stat-value {
            font-size: 18px;
            font-weight: 700;
            color: #fff;
        }

        .stat-value.positive {
            color: #10b981;
        }

        .section {
            margin-bottom: 30px;
        }

        .section-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 15px;
            color: #fff;
        }

        .market-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 15px;
        }

        .market-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .market-card:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .market-question {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 10px;
            color: #fff;
            line-height: 1.4;
        }

        .market-prices {
            display: flex;
            gap: 15px;
            margin-bottom: 10px;
        }

        .price {
            flex: 1;
            background: rgba(79, 70, 229, 0.1);
            padding: 10px;
            border-radius: 6px;
            text-align: center;
        }

        .price-label {
            font-size: 11px;
            color: #888;
            margin-bottom: 4px;
        }

        .price-value {
            font-size: 18px;
            font-weight: 700;
        }

        .arb-card {
            background: rgba(245, 158, 11, 0.05);
            border: 1px solid rgba(245, 158, 11, 0.3);
        }

        .arb-card:hover {
            background: rgba(245, 158, 11, 0.1);
            border-color: rgba(245, 158, 11, 0.5);
        }

        .arb-badge {
            display: inline-block;
            background: #f59e0b;
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .profit {
            color: #f59e0b;
            font-weight: 700;
            font-size: 16px;
        }

        .volume {
            font-size: 12px;
            color: #888;
            margin-top: 10px;
        }

        .no-data {
            text-align: center;
            padding: 40px 20px;
            color: #888;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #888;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #2d3561;
            border-top-color: #4f46e5;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }

            .market-grid {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 Polymarket Dashboard</h1>
            <div class="status">
                <div class="dot" id="statusDot"></div>
                <span id="statusText">Loading...</span>
            </div>
        </div>

        <div class="grid">
            <div class="card">
                <h2>📈 Market Stats</h2>
                <div class="stat">
                    <span class="stat-label">Total Markets</span>
                    <span class="stat-value" id="totalMarkets">-</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Bitcoin Markets</span>
                    <span class="stat-value" id="btcMarkets">-</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Opportunities</span>
                    <span class="stat-value positive" id="opportunities">-</span>
                </div>
            </div>

            <div class="card">
                <h2>🎯 Last Update</h2>
                <div class="stat">
                    <span class="stat-label">Status</span>
                    <span class="stat-value" id="updateStatus">-</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Time</span>
                    <span class="stat-value" id="updateTime">-</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Refresh Rate</span>
                    <span class="stat-value">30s</span>
                </div>
            </div>
        </div>

        <div class="section">
            <div class="section-title">🚨 Arbitrage Opportunities</div>
            <div id="opportunitiesContainer" class="market-grid"></div>
        </div>

        <div class="section">
            <div class="section-title">🪙 Bitcoin Markets</div>
            <div id="btcContainer" class="market-grid"></div>
        </div>
    </div>

    <script>
        const API_URL = '/.netlify/functions/polymarket';
        let lastUpdate = null;

        async function fetchData() {
            const dot = document.getElementById('statusDot');
            dot.className = 'dot loading';

            try {
                const response = await fetch(API_URL);
                const data = await response.json();

                updateStats(data);
                renderOpportunities(data.opportunities);
                renderMarkets(data.markets);

                dot.className = 'dot';
                document.getElementById('statusText').textContent = 'Live';
                document.getElementById('updateStatus').textContent = '✅ Connected';

            } catch (error) {
                console.error('Error fetching data:', error);
                dot.className = 'dot error';
                document.getElementById('statusText').textContent = 'Error';
                document.getElementById('updateStatus').textContent = '❌ Error';
            }

            lastUpdate = new Date();
            updateTime();
        }

        function updateStats(data) {
            document.getElementById('totalMarkets').textContent = data.total_markets || '-';
            document.getElementById('btcMarkets').textContent = data.markets.length || '0';
            document.getElementById('opportunities').textContent = data.opportunities.length || '0';
        }

        function updateTime() {
            if (!lastUpdate) return;
            const now = new Date();
            const diff = Math.floor((now - lastUpdate) / 1000);
            document.getElementById('updateTime').textContent = `${diff}s ago`;
        }

        function renderOpportunities(opportunities) {
            const container = document.getElementById('opportunitiesContainer');

            if (!opportunities || opportunities.length === 0) {
                container.innerHTML = '<div class="no-data">No arbitrage opportunities found</div>';
                return;
            }

            container.innerHTML = opportunities.map(opp => `
                <div class="market-card arb-card">
                    <div class="arb-badge">🎯 ARBITRAGE</div>
                    <div class="market-question">${opp.question.substring(0, 80)}...</div>
                    <div class="market-prices">
                        <div class="price">
                            <div class="price-label">Yes</div>
                            <div class="price-value">${(opp.yes_price * 100).toFixed(0)}¢</div>
                        </div>
                        <div class="price">
                            <div class="price-label">No</div>
                            <div class="price-value">${(opp.no_price * 100).toFixed(0)}¢</div>
                        </div>
                    </div>
                    <div class="profit">Profit: ${opp.profit_pct}%</div>
                    <div class="volume">Volume 24h: $${(opp.volume_24h / 1e6).toFixed(1)}M</div>
                </div>
            `).join('');
        }

        function renderMarkets(markets) {
            const container = document.getElementById('btcContainer');

            if (!markets || markets.length === 0) {
                container.innerHTML = '<div class="no-data">No Bitcoin markets found</div>';
                return;
            }

            container.innerHTML = markets.map(market => `
                <div class="market-card">
                    <div class="market-question">${market.question}</div>
                    <div class="market-prices">
                        <div class="price">
                            <div class="price-label">Yes</div>
                            <div class="price-value">${(market.price * 100).toFixed(0)}¢</div>
                        </div>
                        <div class="price">
                            <div class="price-label">No</div>
                            <div class="price-value">${((1 - market.price) * 100).toFixed(0)}¢</div>
                        </div>
                    </div>
                    <div class="volume">Volume 24h: $${(market.volume_24h / 1e6).toFixed(1)}M</div>
                </div>
            `).join('');
        }

        // Initial fetch
        fetchData();

        // Auto-refresh every 30 seconds
        setInterval(fetchData, 30000);

        // Update time display every second
        setInterval(updateTime, 1000);

        // Refresh on visibility change
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') {
                fetchData();
            }
        });
    </script>
</body>
</html>
