<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading HUD</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Monaco', 'Courier New', monospace;
            background: #0a0a0a;
            color: #00ff41;
            overflow: hidden;
        }

        .hud {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: auto 1fr 1fr;
            height: 100vh;
            gap: 8px;
            padding: 12px;
            background: #0a0a0a;
        }

        .panel {
            border: 2px solid #00ff41;
            background: rgba(0, 255, 65, 0.02);
            padding: 16px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 10px rgba(0, 255, 65, 0.1);
        }

        .header {
            grid-column: 1 / -1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            border: 2px solid #00ff41;
            background: rgba(0, 255, 65, 0.02);
            margin-bottom: 4px;
        }

        .title {
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .timestamp {
            font-size: 11px;
            color: #00cc33;
        }

        .panel-title {
            font-size: 12px;
            font-weight: bold;
            color: #00ff41;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid #00ff41;
            padding-bottom: 8px;
        }

        /* Account Panel */
        .account-panel {
            grid-column: 1;
            grid-row: 2 / 4;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 12px;
            align-items: center;
        }

        .stat-label {
            color: #00aa33;
        }

        .stat-value {
            font-weight: bold;
            color: #00ff41;
            font-family: 'Courier New', monospace;
        }

        .stat-value.positive {
            color: #00ff41;
        }

        .stat-value.negative {
            color: #ff4444;
        }

        .balance {
            font-size: 18px;
            font-weight: bold;
            color: #00ff41;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #00ff41;
        }

        .pnl {
            font-size: 16px;
            font-weight: bold;
            margin-top: 8px;
        }

        /* Positions Panel */
        .positions-panel {
            grid-column: 2;
            grid-row: 2;
        }

        .position-item {
            background: rgba(0, 255, 65, 0.05);
            border: 1px solid #00aa33;
            padding: 8px;
            margin-bottom: 8px;
            font-size: 10px;
        }

        .position-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
            font-weight: bold;
        }

        .position-detail {
            display: flex;
            justify-content: space-between;
            margin-bottom: 2px;
            color: #00aa33;
        }

        .position-side {
            padding: 2px 6px;
            background: #00ff41;
            color: #0a0a0a;
            font-weight: bold;
            border-radius: 2px;
            font-size: 9px;
        }

        /* Markets Panel */
        .markets-panel {
            grid-column: 3;
            grid-row: 2;
        }

        .market-item {
            background: rgba(0, 255, 65, 0.05);
            border: 1px solid #00aa33;
            padding: 8px;
            margin-bottom: 8px;
            font-size: 10px;
        }

        .market-name {
            font-weight: bold;
            margin-bottom: 4px;
        }

        .market-price {
            display: flex;
            justify-content: space-between;
            color: #00aa33;
        }

        /* Orders Panel */
        .orders-panel {
            grid-column: 2 / 4;
            grid-row: 3;
            overflow-y: auto;
        }

        .order-row {
            display: grid;
            grid-template-columns: 0.8fr 0.5fr 0.8fr 1fr 0.6fr;
            gap: 8px;
            padding: 6px;
            border-bottom: 1px solid rgba(0, 255, 65, 0.2);
            font-size: 10px;
            align-items: center;
        }

        .order-row:hover {
            background: rgba(0, 255, 65, 0.08);
        }

        .order-header {
            display: grid;
            grid-template-columns: 0.8fr 0.5fr 0.8fr 1fr 0.6fr;
            gap: 8px;
            padding: 6px;
            font-weight: bold;
            border-bottom: 1px solid #00ff41;
            font-size: 9px;
            text-transform: uppercase;
        }

        .order-time {
            color: #00aa33;
        }

        .order-status {
            padding: 2px 4px;
            border-radius: 2px;
            font-weight: bold;
            font-size: 9px;
        }

        .status-open {
            background: #ffaa00;
            color: #0a0a0a;
        }

        .status-filled {
            background: #00ff41;
            color: #0a0a0a;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 255, 65, 0.05);
        }

        ::-webkit-scrollbar-thumb {
            background: #00ff41;
            border-radius: 3px;
        }

        .status-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #00ff41;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .loading {
            color: #00aa33;
            font-size: 11px;
        }

        /* Responsive */
        @media (max-width: 1400px) {
            .hud {
                grid-template-columns: 1fr 1fr;
                grid-template-rows: auto 1fr 1fr 1fr;
            }

            .account-panel {
                grid-column: 1;
                grid-row: 2;
            }

            .positions-panel {
                grid-column: 2;
                grid-row: 2;
            }

            .markets-panel {
                grid-column: 1 / 3;
                grid-row: 3;
            }

            .orders-panel {
                grid-column: 1 / 3;
                grid-row: 4;
            }
        }
    </style>
</head>
<body>
    <div class="hud">
        <div class="header">
            <div class="title">⚡ TRADING HUD</div>
            <div style="display: flex; gap: 16px; align-items: center;">
                <div class="status-indicator"></div>
                <div class="timestamp" id="timestamp">00:00:00</div>
            </div>
        </div>

        <!-- Account Panel -->
        <div class="panel account-panel">
            <div class="panel-title">Account</div>

            <div class="stat-row">
                <span class="stat-label">BALANCE</span>
                <span class="stat-value" id="balance">$0.00</span>
            </div>

            <div class="stat-row">
                <span class="stat-label">EQUITY</span>
                <span class="stat-value" id="equity">$0.00</span>
            </div>

            <div class="stat-row">
                <span class="stat-label">EXPOSURE</span>
                <span class="stat-value" id="exposure">$0.00</span>
            </div>

            <div class="stat-row">
                <span class="stat-label">POSITIONS</span>
                <span class="stat-value" id="positionCount">0</span>
            </div>

            <div class="stat-row">
                <span class="stat-label">ORDERS</span>
                <span class="stat-value" id="orderCount">0</span>
            </div>

            <div class="balance">
                <div class="stat-label" style="font-size: 11px;">TOTAL P&L</div>
                <div class="pnl" id="totalPnL" style="color: #00ff41;">$0.00</div>
            </div>

            <div class="stat-row" style="margin-top: 16px; justify-content: space-around;">
                <button onclick="refreshData()" style="background: #00ff41; color: #0a0a0a; border: none; padding: 6px 12px; cursor: pointer; font-weight: bold; font-size: 11px;">REFRESH</button>
            </div>
        </div>

        <!-- Positions Panel -->
        <div class="panel positions-panel">
            <div class="panel-title">Open Positions</div>
            <div id="positionsContainer" class="loading">No open positions</div>
        </div>

        <!-- Markets Panel -->
        <div class="panel markets-panel">
            <div class="panel-title">Top Bitcoin Markets</div>
            <div id="marketsContainer" class="loading">Loading markets...</div>
        </div>

        <!-- Orders Panel -->
        <div class="panel orders-panel">
            <div class="panel-title">Recent Orders</div>
            <div class="order-header">
                <div>TIME</div>
                <div>SIDE</div>
                <div>PRICE</div>
                <div>MARKET</div>
                <div>STATUS</div>
            </div>
            <div id="ordersContainer" class="loading">No orders yet</div>
        </div>
    </div>

    <script>
        // Mock data - replace with real API calls
        let mockData = {
            balance: 10000,
            positions: [],
            orders: [],
            markets: []
        };

        async function refreshData() {
            try {
                // Fetch real Polymarket data from Railway backend
                const response = await fetch('https://worker-production-7ce9.up.railway.app/.netlify/functions/polymarket');
                const data = await response.json();

                updateDashboard(data);
            } catch (error) {
                console.error('Error fetching data:', error);
                updateDashboard(getMockData());
            }
        }

        function getMockData() {
            return {
                markets: [
                    { question: 'BTC > $75k by EOY?', yes_price: 0.62, no_price: 0.38, volume_24h: 5000000 },
                    { question: 'ETH > $5k by EOY?', yes_price: 0.45, no_price: 0.55, volume_24h: 3000000 },
                ],
                opportunities: [],
                total_markets: 0
            };
        }

        function updateDashboard(data) {
            const now = new Date();
            document.getElementById('timestamp').textContent = now.toLocaleTimeString();

            // Update account (mock for now)
            const balance = 10000;
            const equity = 10500;
            const exposure = 3000;
            const pnl = equity - balance;

            document.getElementById('balance').textContent = `$${balance.toLocaleString('en-US', { minimumFractionDigits: 2 })}`;
            document.getElementById('equity').textContent = `$${equity.toLocaleString('en-US', { minimumFractionDigits: 2 })}`;
            document.getElementById('exposure').textContent = `$${exposure.toLocaleString('en-US', { minimumFractionDigits: 2 })}`;

            const pnlElement = document.getElementById('totalPnL');
            pnlElement.textContent = `${pnl >= 0 ? '+' : ''}$${pnl.toLocaleString('en-US', { minimumFractionDigits: 2 })}`;
            pnlElement.style.color = pnl >= 0 ? '#00ff41' : '#ff4444';

            // Update positions (mock)
            const positions = [
                { market: 'BTC > 75k', side: 'YES', quantity: 10, entry: 0.60, current: 0.62, pnl: 20 },
                { market: 'ETH > 5k', side: 'NO', quantity: 15, entry: 0.56, current: 0.55, pnl: 15 }
            ];

            document.getElementById('positionCount').textContent = positions.length;
            const positionsHtml = positions.map(pos => `
                <div class="position-item">
                    <div class="position-header">
                        <span>${pos.market}</span>
                        <span class="position-side">${pos.side}</span>
                    </div>
                    <div class="position-detail">
                        <span>QTY: ${pos.quantity}</span>
                        <span style="color: ${pos.pnl >= 0 ? '#00ff41' : '#ff4444'};">+$${pos.pnl}</span>
                    </div>
                    <div class="position-detail">
                        <span>${pos.entry} → ${pos.current}</span>
                    </div>
                </div>
            `).join('');
            document.getElementById('positionsContainer').innerHTML = positionsHtml || '<div class="loading">No positions</div>';

            // Update markets
            if (data.markets && data.markets.length > 0) {
                const marketsHtml = data.markets.slice(0, 5).map(m => `
                    <div class="market-item">
                        <div class="market-name">${m.question.substring(0, 40)}...</div>
                        <div class="market-price">
                            <span>YES: ${(m.yes_price * 100).toFixed(0)}¢</span>
                            <span>NO: ${(m.no_price * 100).toFixed(0)}¢</span>
                        </div>
                    </div>
                `).join('');
                document.getElementById('marketsContainer').innerHTML = marketsHtml;
            }

            // Update orders (mock)
            const orders = [
                { time: '14:23:45', side: 'BUY', price: '0.62', market: 'BTC > 75k', status: 'FILLED' },
                { time: '14:15:32', side: 'SELL', price: '0.55', market: 'ETH > 5k', status: 'FILLED' },
                { time: '14:08:12', side: 'BUY', price: '0.58', market: 'XRP > $1', status: 'OPEN' },
            ];

            document.getElementById('orderCount').textContent = orders.length;
            const ordersHtml = orders.map(o => `
                <div class="order-row">
                    <div class="order-time">${o.time}</div>
                    <div style="color: ${o.side === 'BUY' ? '#00ff41' : '#ff4444'}">${o.side}</div>
                    <div>${o.price}</div>
                    <div style="color: #00aa33;">${o.market}</div>
                    <div class="order-status ${o.status === 'FILLED' ? 'status-filled' : 'status-open'}">${o.status}</div>
                </div>
            `).join('');
            document.getElementById('ordersContainer').innerHTML = ordersHtml;
        }

        // Auto-refresh every 5 seconds
        refreshData();
        setInterval(refreshData, 5000);

        // Update timestamp every second
        setInterval(() => {
            const now = new Date();
            document.getElementById('timestamp').textContent = now.toLocaleTimeString();
        }, 1000);
    </script>
</body>
</html>
